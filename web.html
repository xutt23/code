<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>服务端聊天室</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{max-width:900px;margin:20px auto;padding:0 15px}
        #chatBox{
            width:100%;
            height:500px;
            border:1px solid #ccc;
            padding:10px;
            overflow-y:auto;
            margin-bottom:15px;
            background:#f9f9f9;
        }
        .msg{margin:6px 0;line-height:1.6}
        #name{width:120px;padding:8px;border:1px solid #ddd}
        #inputMsg{flex:1;padding:8px;border:1px solid #ddd;margin:0 8px}
        .sendArea{display:flex;align-items:center}
        button{padding:8px 16px;background:#007bff;color:white;border:none;cursor:pointer;border-radius:4px}
    </style>
</head>
<body>
    <h2>服务端聊天室（记录存入data.txt）</h2>
    <div id="chatBox"></div>
    <div class="sendArea">
        <input type="text" id="name" placeholder="输入昵称" value="游客">
        <input type="text" id="inputMsg" placeholder="输入内容回车发送">
        <button onclick="send()">发送</button>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        // 获取消息列表
        async function getMsg(){
            let res = await fetch("/get");
            let list = await res.json();
            chatBox.innerHTML = "";
            list.forEach(item=>{
                let div = document.createElement("div");
                div.className = "msg";
                div.innerHTML = `[${item.time}] ${item.name}: ${item.content}`;
                chatBox.appendChild(div);
            })
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        // 发送消息提交后端写入data.txt
        async function send(){
            let name = document.getElementById("name").value.trim();
            let content = document.getElementById("inputMsg").value.trim();
            if(!name||!content) return;
            await fetch("/send",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({name,content})
            })
            document.getElementById("inputMsg").value = "";
            getMsg();
        }
        document.getElementById("inputMsg").onkeydown=e=>e.key=="Enter"&&send();
        setInterval(getMsg,1000);
        getMsg();
    </script>
</body>
</html>
